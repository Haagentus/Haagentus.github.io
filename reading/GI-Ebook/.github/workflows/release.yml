name: Release EPUB

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Run PowerShell build script
        shell: pwsh
        run: |
          ./build-epub.ps1

      - name: List generated files
        shell: pwsh
        run: |
          Get-ChildItem -Path output

      - name: Rename EPUBs with version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Get-ChildItem output/*.epub | ForEach-Object {
            $newName = "$($_.BaseName)-$version.epub"
            Rename-Item $_.FullName (Join-Path $_.DirectoryName $newName)
            Write-Host "Renamed to $newName"
          }

      - name: Create Release and Upload EPUBs
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.epub
          overwrite_files: false
          make_latest: true
          fail_on_unmatched_files: false
          preserve_order: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}